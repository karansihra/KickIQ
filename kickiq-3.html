// ─── Utility ────────────────────────────────────
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function pick(diff) { return shuffle(QUESTIONS[diff]).slice(0, NUM_Q); }
function makeCode() { return Array.from({length:5},()=>LETTERS[Math.floor(Math.random()*LETTERS.length)]).join(""); }
function $(id) { return document.getElementById(id); }
function show(id) { document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); $(id).classList.add("active"); $(id).classList.remove("anim"); void $(id).offsetWidth; $(id).classList.add("anim"); }
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => { if (c != null) el.append(typeof c === "string" ? document.createTextNode(c) : c); });
  return el;
}

// ─── PeerJS Multiplayer ─────────────────────────
function destroyPeer() {
  if (state.conn) { try { state.conn.close(); } catch(e){} state.conn = null; }
  if (state.peer) { try { state.peer.destroy(); } catch(e){} state.peer = null; }
}

function sendData(data) {
  if (state.conn && state.conn.open) {
    try { state.conn.send(JSON.stringify(data)); } catch(e){}
  }
}

function handleData(raw) {
  let data;
  try { data = JSON.parse(raw); } catch(e) { return; }

  if (data.type === "game_start") {
    // Guest receives questions + settings from host
    state.questions = data.questions;
    state.difficulty = data.difficulty;
    state.opponentName = data.hostName;
    state.timerSettings[data.difficulty] = data.timerSec;
    state.score = 0; state.answers = []; state.currentQ = 0;
    state.opponentScore = 0; state.opponentDone = false;
    startPlaying();
  }
  if (data.type === "guest_joined") {
    // Host learns guest name, starts game
    state.opponentName = data.guestName;
    // Send game data to guest
    sendData({
      type: "game_start",
      questions: state.questions,
      difficulty: state.difficulty,
      timerSec: state.timerSettings[state.difficulty],
      hostName: state.name,
    });
    state.score = 0; state.answers = []; state.currentQ = 0;
    state.opponentScore = 0; state.opponentDone = false;
    startPlaying();
  }
  if (data.type === "answer") {
    state.opponentScore = data.score;
    updateScoreboard();
  }
  if (data.type === "done") {
    state.opponentScore = data.score;
    state.opponentDone = true;
    if (state.showResult && state.currentQ >= state.questions.length - 1) {
      // Already on results, refresh
      renderResults();
    }
  }
}

function createRoom() {
  const code = "KIQ" + makeCode();
  state.roomCode = code;
  state.isHost = true;

  destroyPeer();
  const peer = new Peer(code);
  state.peer = peer;

  $("wait-code").textContent = code;
  $("wait-diff").textContent = `${DIFF[state.difficulty].emoji} ${DIFF[state.difficulty].label} · ${state.timerSettings[state.difficulty]}s per question`;
  show("waiting");

  peer.on("open", () => {
    $("wait-status").textContent = "Share this code with your friend";
  });
  peer.on("connection", (conn) => {
    state.conn = conn;
    conn.on("data", handleData);
    conn.on("close", () => { state.conn = null; });
  });
  peer.on("error", (err) => {
    $("wait-status").textContent = "Connection error. Try again.";
    console.error(err);
  });
}

function joinRoom() {
  const code = $("join-input").value.trim().toUpperCase();
  if (!code) { $("lobby-error").textContent = "Enter a room code."; $("lobby-error").style.display = "block"; return; }
  if (!state.name) return;

  $("lobby-error").style.display = "none";
  destroyPeer();

  const peer = new Peer();
  state.peer = peer;
  state.isHost = false;
  state.roomCode = code;

  peer.on("open", () => {
    const conn = peer.connect(code, { reliable: true });
    state.conn = conn;
    conn.on("open", () => {
      sendData({ type: "guest_joined", guestName: state.name });
    });
    conn.on("data", handleData);
    conn.on("close", () => { state.conn = null; });
    conn.on("error", (err) => {
      $("lobby-error").textContent = "Could not connect. Check your code.";
      $("lobby-error").style.display = "block";
    });
  });
  peer.on("error", (err) => {
    $("lobby-error").textContent = "Game not found. Check your code and try again.";
    $("lobby-error").style.display = "block";
    console.error(err);
  });
}

// ─── Game Logic ─────────────────────────────────
function startPlaying() {
  state.selected = null;
  state.showResult = false;
  state.showQuit = false;
  state.currentQ = 0;
  startTimer();
  show("playing");
  renderQuestion();
}

function startTimer() {
  clearInterval(state.timerId);
  state.timeLeft = state.timerSettings[state.difficulty];
  state.timerId = setInterval(() => {
    state.timeLeft--;
    updateTimer();
    if (state.timeLeft <= 0) {
      clearInterval(state.timerId);
      if (!state.showResult) selectAnswer(-1);
    }
  }, 1000);
}

function updateTimer() {
  const el = $("timer");
  if (!el) return;
  el.textContent = state.timeLeft;
  el.className = "timer-ring " + (state.timeLeft <= 5 ? "danger" : "safe");
}

function updateScoreboard() {
  const el = $("scoreboard");
  if (!el) return;
  if (state.mode === "computer") {
    el.innerHTML = `You: <b style="color:var(--pitch)">${state.score}</b> · CPU: <b style="color:var(--red)">${state.cpuScore}</b>`;
  } else {
    el.innerHTML = `${esc(state.name)}: <b style="color:var(--pitch)">${state.score}</b> · ${esc(state.opponentName)}: <b style="color:var(--blue)">${state.opponentScore}</b>`;
  }
}

function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

function selectAnswer(idx) {
  if (state.showResult) return;
  clearInterval(state.timerId);
  state.selected = idx;
  state.showResult = true;

  const q = state.questions[state.currentQ];
  const correct = q.ans === idx;
  const timeTaken = state.timerSettings[state.difficulty] - state.timeLeft;
  state.answers.push({ selected: idx, correct, timeTaken });
  if (correct) state.score++;

  // CPU
  if (state.mode === "computer") {
    const chance = state.difficulty === "beginner" ? 0.55 : state.difficulty === "intermediate" ? 0.45 : 0.35;
    if (Math.random() < chance) state.cpuScore++;
  }

  // Sync online
  if (state.mode === "online") {
    sendData({ type: "answer", score: state.score });
  }

  // Highlight options
  const opts = document.querySelectorAll("#q-options .opt");
  opts.forEach((o, i) => {
    o.style.pointerEvents = "none";
    if (i === q.ans) o.classList.add("correct");
    else if (i === idx && !correct) o.classList.add("wrong");
  });

  if (idx === -1) {
    $("timeout-msg").style.display = "block";
  }

  updateScoreboard();

  setTimeout(() => {
    if (state.currentQ + 1 < state.questions.length) {
      state.currentQ++;
      state.selected = null;
      state.showResult = false;
      startTimer();
      renderQuestion();
    } else {
      // Game over
      if (state.mode === "online") {
        sendData({ type: "done", score: state.score });
      }
      clearInterval(state.timerId);
      show("results");
      renderResults();
    }
  }, 1800);
}

function renderQuestion() {
  const q = state.questions[state.currentQ];
  $("q-num").textContent = `Q ${state.currentQ + 1} / ${state.questions.length}`;
  $("q-progress-fill").style.width = `${(state.currentQ / state.questions.length) * 100}%`;
  $("q-badge").textContent = `🏴󠁧󠁢󠁥󠁮󠁧󠁿 PREMIER LEAGUE · ${DIFF[state.difficulty].label.toUpperCase()}`;
  $("q-badge").style.color = DIFF[state.difficulty].color;
  $("q-badge").style.background = DIFF[state.difficulty].color + "18";
  $("q-badge").style.borderColor = DIFF[state.difficulty].color + "33";
  $("q-text").textContent = q.q;
  $("timeout-msg").style.display = "none";
  updateTimer();
  updateScoreboard();

  const container = $("q-options");
  container.innerHTML = "";
  q.opts.forEach((opt, i) => {
    const div = document.createElement("div");
    div.className = "opt";
    div.innerHTML = `<div class="letter">${String.fromCharCode(65+i)}</div><span class="text">${esc(opt)}</span>`;
    div.addEventListener("click", () => selectAnswer(i));
    container.appendChild(div);
  });
}

function renderResults() {
  const oppScore = state.mode === "computer" ? state.cpuScore : state.opponentScore;
  const oppName = state.mode === "computer" ? "CPU" : (state.opponentName || "Opponent");
  const win = state.score > oppScore;
  const draw = state.score === oppScore;

  $("r-emoji").textContent = win ? "🏆" : draw ? "🤝" : "😤";
  $("r-title").textContent = win ? "YOU WIN!" : draw ? "DRAW!" : "YOU LOSE!";
  $("r-subtitle").textContent = `Premier League · ${DIFF[state.difficulty].label}`;

  $("r-my-name").textContent = state.name;
  $("r-my-name").style.color = "var(--pitch)";
  $("r-my-score").textContent = state.score;
  $("r-opp-name").textContent = oppName;
  $("r-opp-name").style.color = state.mode === "computer" ? "var(--red)" : "var(--blue)";
  $("r-opp-score").textContent = oppScore;
  $("r-total").textContent = `/ ${state.questions.length}`;
  $("r-total2").textContent = `/ ${state.questions.length}`;

  $("r-correct").textContent = `${state.score}/${state.questions.length}`;
  const avgTime = state.answers.length ? (state.answers.reduce((a,b)=>a+b.timeTaken,0)/state.answers.length).toFixed(1) + "s" : "-";
  $("r-avgtime").textContent = avgTime;
  $("r-accuracy").textContent = `${Math.round((state.score/state.questions.length)*100)}%`;

  // Answer review
  const rev = $("r-review");
  rev.innerHTML = "";
  state.questions.forEach((q, i) => {
    const a = state.answers[i];
    const row = document.createElement("div");
    row.style.cssText = `display:flex;align-items:flex-start;gap:8px;padding:8px 0;${i < state.questions.length - 1 ? "border-bottom:1px solid var(--border)" : ""}`;
    const icon = a?.correct ? "✓" : "✗";
    const iconColor = a?.correct ? "var(--pitch)" : "var(--red)";
    const iconBg = a?.correct ? "rgba(0,230,118,0.13)" : "rgba(255,82,82,0.13)";
    let html = `<div style="width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:1px;background:${iconBg};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${iconColor}">${icon}</div>`;
    html += `<div style="flex:1"><div style="font-size:11px;color:var(--text);line-height:1.4">${esc(q.q)}</div>`;
    if (!a?.correct) html += `<div style="font-size:10px;color:var(--pitch);margin-top:2px">Answer: ${esc(q.opts[q.ans])}</div>`;
    html += `</div>`;
    if (a) html += `<span style="font-size:10px;color:var(--textDim);flex-shrink:0">${a.timeTaken}s</span>`;
    row.innerHTML = html;
    rev.appendChild(row);
  });

  // Waiting for opponent
  if (state.mode === "online" && !state.opponentDone) {
    $("r-waiting").style.display = "block";
    $("r-waiting").textContent = `⏳ Waiting for ${esc(oppName)} to finish...`;
  } else {
    $("r-waiting").style.display = "none";
  }
}

function goHome() {
  clearInterval(state.timerId);
  destroyPeer();
  state.showQuit = false;
  $("quit-overlay").style.display = "none";
  show("menu");
}

function startVsComputer() {
  state.mode = "computer";
  state.questions = pick(state.difficulty);
  state.score = 0; state.answers = []; state.cpuScore = 0; state.currentQ = 0;
  state.opponentScore = 0; state.opponentDone = false;
  startPlaying();
}

    <div style="font-size:11px;font-weight:700;color:var(--textDim);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px">Timer (seconds per question)</div>
    <div id="set-timers"></div>
    <div style="font-size:11px;font-weight:700;color:var(--textDim);text-transform:uppercase;letter-spacing:2px;margin-top:20px;margin-bottom:10px">Profile</div>
    <div class="card">
      <div style="font-size:12px;color:var(--textSec);margin-bottom:6px">Display Name</div>
      <input id="set-name" class="input" maxlength="20">
    </div>
  </div>
  `;

  // ─── Wire Events ──────────────────────────────
  $("name-btn").onclick = () => { if ($("name-input").value.trim()) { state.name = $("name-input").value.trim(); $("menu-greeting").textContent = `Hey ${state.name} 👋`; show("menu"); } };
  $("name-input").onkeydown = (e) => { if (e.key === "Enter") $("name-btn").click(); };

  $("mode-cpu").onclick = () => { state.mode = "computer"; showDifficulty(); };
  $("mode-online").onclick = () => { state.mode = "online"; showDifficulty(); };
  $("settings-btn").onclick = () => showSettings();

  $("diff-back").onclick = $("diff-back2").onclick = () => show("menu");
  $("diff-home").onclick = goHome;

  $("diff-timer-slider").oninput = (e) => {
    state.timerSettings[state.difficulty] = parseInt(e.target.value);
    $("diff-timer-val").textContent = e.target.value + "s";
  };

  $("lobby-back").onclick = $("lobby-back2").onclick = () => { destroyPeer(); showDifficulty(); };
  $("lobby-home").onclick = goHome;
  $("create-btn").onclick = () => { state.questions = pick(state.difficulty); createRoom(); };
  $("join-btn").onclick = joinRoom;
  $("join-input").onkeydown = (e) => { if (e.key === "Enter") joinRoom(); };

  $("wait-cancel").onclick = goHome;

  $("quit-btn").onclick = () => { $("quit-overlay").style.display = "flex"; };
  $("quit-yes").onclick = goHome;
  $("quit-no").onclick = () => { $("quit-overlay").style.display = "none"; };

  $("r-home-btn").onclick = goHome;
  $("r-home").onclick = goHome;
  $("r-again").onclick = () => {
    if (state.mode === "computer") startVsComputer();
    else { $("lobby-error").style.display = "none"; showLobby(); }
  };

  $("set-back").onclick = $("set-back2").onclick = goHome;
  $("set-name").oninput = (e) => { state.name = e.target.value; $("menu-greeting").textContent = `Hey ${state.name} 👋`; };
}

function showDifficulty() {
  $("diff-mode-label").textContent = state.mode === "computer" ? "🤖 vs Computer · Premier League" : "🌐 Online · Premier League";
  const container = $("diff-cards");
  container.innerHTML = "";
  Object.entries(DIFF).forEach(([key, meta]) => {
    const card = document.createElement("div");
    card.className = "card diff-card";
    card.style.borderLeft = `4px solid ${meta.color}`;
    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:18px">${meta.emoji}</span>
        <span style="font-size:16px;font-weight:700">${meta.label}</span>
        <span style="margin-left:auto;font-size:11px;color:${meta.color};font-weight:600">×${meta.xp} XP</span>
      </div>
      <div style="font-size:11px;color:var(--textSec)">Default: ${state.timerSettings[key]}s per question · ${NUM_Q} questions</div>
    `;
    card.onclick = () => {
      state.difficulty = key;
      if (state.mode === "computer") startVsComputer();
      else showLobby();
    };
    container.appendChild(card);
  });
  $("diff-timer-slider").value = state.timerSettings[state.difficulty];
  $("diff-timer-val").textContent = state.timerSettings[state.difficulty] + "s";
  show("difficulty");

  // Update slider on difficulty highlight
  container.querySelectorAll(".diff-card").forEach((card, i) => {
    const key = Object.keys(DIFF)[i];
    card.addEventListener("mouseenter", () => {
      $("diff-timer-slider").value = state.timerSettings[key];
      $("diff-timer-val").textContent = state.timerSettings[key] + "s";
      state.difficulty = key;
    });
  });
}

function showLobby() {
  $("lobby-meta").textContent = `${DIFF[state.difficulty].emoji} ${DIFF[state.difficulty].label} · ${state.timerSettings[state.difficulty]}s timer`;
  $("lobby-error").style.display = "none";
  $("join-input").value = "";
  show("lobby");
}

function showSettings() {
  const container = $("set-timers");
  container.innerHTML = "";
  Object.entries(DIFF).forEach(([key, meta]) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.cssText = `margin-bottom:8px;border-left:3px solid ${meta.color}`;
    const valSpan = document.createElement("span");
    valSpan.style.cssText = `font-size:14px;font-weight:700;color:${meta.color}`;
    valSpan.textContent = state.timerSettings[key] + "s";
    card.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;font-weight:600">${meta.emoji} ${meta.label}</span></div>`;
    card.querySelector("div").appendChild(valSpan);
    const slider = document.createElement("input");
    slider.type = "range"; slider.min = 5; slider.max = 60; slider.value = state.timerSettings[key];
    slider.style.width = "100%";
    slider.oninput = (e) => { state.timerSettings[key] = parseInt(e.target.value); valSpan.textContent = e.target.value + "s"; };
    card.appendChild(slider);
    container.appendChild(card);
  });
  $("set-name").value = state.name;
  show("settings");
}

// ─── Init ───────────────────────────────────────
buildApp();
</script>
</body>
</html>
